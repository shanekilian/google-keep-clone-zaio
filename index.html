<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Google Keep</title>
  </head>
  <body>
    <header>
      <nav class="top-navbar">
        <div class="top-navbar-left">
          <i class="material-icons">menu</i>
          <img
            src="./assets/logo_keep_2026_color_2x_web_48dp.png"
            alt="Google Keep Logo"
          />
          <span>Keep</span>
        </div>

        <div class="top-navbar-centre">
          <i class="material-icons">search</i>
          <input type="search" placeholder="Search" />
        </div>

        <div class="top-navbar-right">
          <i class="material-icons-outlined">search</i>
          <i class="material-icons-outlined">view_agenda</i>
          <i class="material-icons-outlined">settings</i>
          <i class="material-icons-outlined">apps</i>
          <i class="material-icons-outlined">account_circle</i>
        </div>
      </nav>
    </header>

    <div class="content-wrapper">
      <aside>
        <nav class="sidebar">
          <div class="sidebar-items">
            <div class="sidebar-item">
              <i class="material-icons-outlined">lightbulb</i><span>Notes</span>
            </div>
            <div class="sidebar-item">
              <i class="material-icons-outlined">add_alert</i
              ><span>Reminder</span>
            </div>
            <div class="sidebar-item">
              <i class="material-icons-outlined">edit</i
              ><span>Edit Labels</span>
            </div>
            <div class="sidebar-item">
              <i class="material-icons-outlined">archive</i><span>Archive</span>
            </div>
            <div class="sidebar-item">
              <i class="material-icons-outlined">delete</i><span>Bin</span>
            </div>
          </div>
          <div class="sidebar-footer">
            <span>Zaio Google Keep Educational Project</span>
          </div>
        </nav>
      </aside>
      <main>
        <div class="note-bar">
          <div class="note-input">
            <input type="text" placeholder="Take a note..." />
          </div>
          <div class="note-input-icons">
            <i class="material-icons-outlined">check_box</i>
            <i class="material-icons-outlined">brush</i>
            <i class="material-icons-outlined">image</i>
          </div>
        </div>
        <div class="note-dashboard">
          <i class="material-icons-outlined">lightbulb</i>
          <span>Notes that you add appear here</span>
        </div>
      </main>
    </div>
  </body>
</html>
