<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Outfit:wght@100..900&display=swap"

    />
    <link rel="stylesheet" href="style.css" />
    <title>Google Keep</title>
  </head>
  <body>
    <header>
      <nav class="top-navbar">
        <div class="top-navbar-left">
          <i class="material-icons">menu</i>
          <img
            src="./assets/logo_keep_2026_color_2x_web_48dp.png"
            alt="Google Keep Logo"
          />
          <span>Keep</span>
        </div>

        <div class="top-navbar-centre">
          <i class="material-icons">search</i>
          <input type="search" placeholder="Search" />
        </div>

        <div class="top-navbar-right">
          <i class="material-icons">search</i>
          <i class="material-icons">view_agenda</i>
          <i class="material-icons">settings</i>
          <i class="material-icons">apps</i>
          <i class="material-icons">account_circle</i>

    <aside>
      <nav></nav>
